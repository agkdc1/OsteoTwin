server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-file routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → Planning Server (Cloud Run internal URL via env)
    # These are set at deploy time via PLANNING_API_URL env var
    # For Cloud Run: services communicate via their .run.app URLs
    location /api/ {
        proxy_pass ${PLANNING_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass ${PLANNING_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass ${PLANNING_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass ${PLANNING_API_URL};
    }

    location /stl-proxy/ {
        proxy_pass ${PLANNING_API_URL};
        proxy_set_header Host $host;
    }

    # Simulation API proxy
    location /sim-api/ {
        rewrite ^/sim-api/(.*)$ /api/$1 break;
        proxy_pass ${SIMULATION_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
